# Inflowenger platform — Infra + a Fractal runtime.
#
# Infra runs an embedded NATS server and bootstraps every account/credential the
# ecosystem needs on first boot (persisted to ./store). Fractal is the runtime
# that executes workflow graphs; it registers itself against Infra's built-in
# default onboarding portal (path "abc") over the shared `inflow_net` network.
#
#   cp .env.example .env             # then set API_JWT_SECRET
#   docker network create inflow_net # shared external net (once per host)
#   docker compose up -d
#
name: inflow-platform

services:
  infra:
    image: ${INFRA_IMAGE:-mehdishokohi/inflow-infra:latest}
    container_name: inflow-infra
    restart: unless-stopped
    environment:
      # All optional. If OPERATOR_SEED / API_JWT_SECRET are left blank, Infra
      # generates them on first boot and writes them to /data. Set
      # API_JWT_SECRET explicitly so the inspector panel can share the same secret.
      OPERATOR_SEED: ${OPERATOR_SEED:-}
      API_JWT_SECRET: ${API_JWT_SECRET:-}
      INFRA_CLUSTER: ${INFRA_CLUSTER:-}
    volumes:
      # Persists the operator seed + API key. Without this, every restart mints
      # new keys and invalidates existing Fractals, plugins, and panels.
      - ./store:/data
    ports:
      - "8022:8022"   # HTTP API / onboarding portal
      - "8222:8222"   # NATS HTTP monitor
      - "4222:4222"   # NATS client (only needed to connect from the host)
    networks:
      - inflow_net
    healthcheck:
      # HTTP smoke test: the onboarding portal Fractal registers against must be
      # answering before dependents start. The image ships no curl/wget/nc, so we
      # do the HTTP round-trip with bash's /dev/tcp — a 405 for GET still proves
      # the HTTP server is routing (the endpoint is POST-only), which is all a
      # readiness smoke test needs.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8022 && printf 'GET /register/abc HTTP/1.0\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -qi http"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  fractal:
    image: ${FRACTAL_IMAGE:-mehdishokohi/fractal:latest}
    container_name: ${FRACTAL_NAME:-fractal-1}
    restart: unless-stopped   # retries registration until Infra is reachable
    depends_on:
      infra:
        # Wait for Infra's HTTP smoke test to pass, not just for the container
        # to start, so the first registration attempt lands on a live portal.
        condition: service_healthy
    environment:
      TAGS: ${FRACTAL_TAGS:-default}
      # Registers against Infra's built-in default portal ("abc"), reached by
      # the compose service name over inflow_net.
      REGISTER_URL: ${FRACTAL_REGISTER_URL:-http://inflow-infra:8022/register/abc}
    networks:
      - inflow_net

networks:
  # Shared, externally-managed network (fixed name, no compose project prefix) so
  # the inspector stack and the `curl | bash` Fractal installer attach to the
  # exact same network. Create it once before `up`:
  #   docker network create inflow_net
  inflow_net:
    external: true
